        // 解析输入并创建提醒
        function parseAndCreateReminder() {
            const input = document.getElementById('dietInput').value.trim();
            if (!input) {
                showCustomModal('输入提示', '请输入饮食计划');
                return;
            }

            const lines = input.split('\n').filter(line => line.trim());
            const newReminders = [];
            let currentDayOffset = 1; // Day1对应day1

            lines.forEach(line => {
                console.log('处理行:', line);

                // 检查是否是Day X标记
                const dayMatch = line.match(/Day\s*(\d+)/i);
                if (dayMatch) {
                    currentDayOffset = parseInt(dayMatch[1]); // Day1对应day1，Day2对应day2
                    console.log('检测到Day标记,更新currentDayOffset为:', currentDayOffset);
                    return;
                }

                const reminder = parseDietLine(line.trim(), currentDayOffset);
                console.log('parseDietLine返回结果:', reminder);
                if (reminder) {
                    newReminders.push(reminder);
                } else {
                    console.log('parseDietLine返回null,跳过此行');
                }
            });

            if (newReminders.length === 0) {
                showCustomModal('识别失败', '未能识别到有效的饮食计划，请检查格式');
                return;
            }

            // 检查是否有过去的提醒
            const now = Date.now();
            const expiredReminders = newReminders.filter(r => now >= r.reminderTime);
            const futureReminders = newReminders.filter(r => now < r.reminderTime);

            if (expiredReminders.length > 0) {
                // 有过去的提醒，询问用户是否要删除它们
                const expiredInfo = expiredReminders.map(r => {
                    const date = new Date(r.reminderTime);
                    const timeStr = date.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    return `• ${timeStr} ${r.content}`;
                }).join('\n');

                const userChoice = confirm(
                    `检测到 ${expiredReminders.length} 个提醒时间已过去：\n\n${expiredInfo}\n\n` +
                    `是否删除这些过去的提醒？\n\n` +
                    `点击"确定"删除过去的提醒，只保留将来的提醒。\n` +
                    `点击"取消"保留所有提醒（过去的提醒不会发出通知）。`
                );

                if (userChoice) {
                    // 删除过去的提醒
                    reminders = [...reminders, ...futureReminders];
                    showCustomModal('创建成功', `成功创建 ${futureReminders.length} 个饮食提醒！\n已删除 ${expiredReminders.length} 个过去的提醒。`);
                } else {
                    // 保留所有提醒，但标记过去的提醒为已通知
                    expiredReminders.forEach(r => r.notified = true);
                    reminders = [...reminders, ...newReminders];
                    showCustomModal('创建成功', `成功创建 ${newReminders.length} 个饮食提醒！\n已保留 ${expiredReminders.length} 个过去的提醒（不会发出通知）。`);
                }
            } else {
                // 没有过去的提醒，正常保存
                reminders = [...reminders, ...newReminders];
                showCustomModal('创建成功', `成功创建 ${newReminders.length} 个饮食提醒！\n提醒已分配到接下来的 ${currentDayOffset} 天。`);
            }

            saveReminders();
            console.log('创建提醒完成 - 当前所有提醒:', reminders);
            console.log('当前查看天数:', currentViewDay);
            console.log('新创建的提醒:', newReminders);

            // 自动切换到新提醒所在的天数（如果是相对时间）
            if (newReminders.length > 0) {
                const firstReminder = newReminders[0];
                if (firstReminder.dayIndex >= 1 && firstReminder.dayIndex <= 7) {
                    currentViewDay = firstReminder.dayIndex;
                    updateDayButtons();
                    console.log('自动切换到天数:', currentViewDay);
                }
            }

            renderReminders();
            clearInput();
        }

        // 解析单行饮食计划
        function parseDietLine(line, dayOffset = 0) {
            console.log('=== parseDietLine 开始 ===');
            console.log('输入行:', line);
            console.log('dayOffset:', dayOffset);
            console.log('currentViewDay:', typeof currentViewDay !== 'undefined' ? currentViewDay : '未定义');

            const now = new Date();
            const baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate()); // 当天午夜

            // 识别相对时间（如"30分钟之后"、"1小时后"、"一分钟"、"两小时"等）
            const relativeMinuteMatch = line.match(/(\d+)\s*分钟[之]?后/);
            const relativeHourMatch = line.match(/(\d+)\s*小时[之]?后/);
            const relativeChineseMinuteMatch = line.match(/([一二三四五六七八九十百]+)\s*分钟[之]?后/);
            const relativeChineseHourMatch = line.match(/([一二三四五六七八九十百]+)\s*小时[之]?后/);

            // 中文数字映射
            const chineseNumberMap = {
                '一': 1, '二': 2, '两': 2, '三': 3, '四': 4,
                '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10
            };

            let reminderTime = null;
            let timeStr = '';
            let isRelativeTime = false;
            let timeOfDay = null; // 存储时间段，在函数开头声明避免作用域问题

            if (relativeMinuteMatch) {
                // 处理"X分钟之后"（阿拉伯数字）
                const minutes = parseInt(relativeMinuteMatch[1]);
                reminderTime = new Date(now.getTime() + minutes * 60 * 1000);
                timeStr = relativeMinuteMatch[0];
                isRelativeTime = true;
            } else if (relativeChineseMinuteMatch) {
                // 处理"X分钟之后"（中文数字）
                const chineseNum = relativeChineseMinuteMatch[1];
                const minutes = chineseNumberMap[chineseNum] || parseInt(chineseNum);
                reminderTime = new Date(now.getTime() + minutes * 60 * 1000);
                timeStr = relativeChineseMinuteMatch[0];
                isRelativeTime = true;
            } else if (relativeHourMatch) {
                // 处理"X小时之后"（阿拉伯数字）
                const hours = parseInt(relativeHourMatch[1]);
                reminderTime = new Date(now.getTime() + hours * 60 * 60 * 1000);
                timeStr = relativeHourMatch[0];
                isRelativeTime = true;
            } else if (relativeChineseHourMatch) {
                // 处理"X小时之后"（中文数字）
                const chineseNum = relativeChineseHourMatch[1];
                const hours = chineseNumberMap[chineseNum] || parseInt(chineseNum);
                reminderTime = new Date(now.getTime() + hours * 60 * 60 * 1000);
                timeStr = relativeChineseHourMatch[0];
                isRelativeTime = true;
            } else {
                // 识别绝对时间（支持阿拉伯数字和中文数字）
                const timeMatch = line.match(/(\d{1,2}):(\d{2})/);
                const hourMatch = line.match(/(\d{1,2})点/);
                const hourMatch2 = line.match(/(\d{1,2})时/);

                // 中文数字映射
                const chineseNumberMap = {
                    '一': 1, '二': 2, '两': 2, '三': 3, '四': 4,
                    '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10,
                    '十一': 11, '十二': 12
                };

                // 匹配中文数字点（如"八点"、"十二点"）
                const chineseHourMatch = line.match(/(一|二|两|三|四|五|六|七|八|九|十|十一|十二)点/);
                const chineseHourMatch2 = line.match(/(一|二|两|三|四|五|六|七|八|九|十|十一|十二)时/);

                console.log('时间匹配结果:', {
                    timeMatch,
                    hourMatch,
                    hourMatch2,
                    chineseHourMatch,
                    chineseHourMatch2
                });

                // 识别时间段（早上、晚上等）
                const morningMatch = line.match(/早上|早晨|上午/);
                const afternoonMatch = line.match(/下午|午后/);
                const eveningMatch = line.match(/晚上|夜间|夜里/);
                const nightMatch = line.match(/深夜|凌晨/);

                console.log('时间段匹配结果:', {
                    morningMatch,
                    afternoonMatch,
                    eveningMatch,
                    nightMatch
                });

                let hours, minutes = 0;

                if (timeMatch) {
                    hours = parseInt(timeMatch[1]);
                    minutes = parseInt(timeMatch[2]);
                    timeStr = timeMatch[0];
                } else if (hourMatch) {
                    hours = parseInt(hourMatch[1]);
                    timeStr = hourMatch[0];
                } else if (hourMatch2) {
                    hours = parseInt(hourMatch2[1]);
                    timeStr = hourMatch2[0];
                } else if (chineseHourMatch) {
                    // 处理中文数字点（如"八点"）
                    const chineseNum = chineseHourMatch[1];
                    hours = chineseNumberMap[chineseNum];
                    timeStr = chineseHourMatch[0];
                } else if (chineseHourMatch2) {
                    // 处理中文数字时（如"八时"）
                    const chineseNum = chineseHourMatch2[1];
                    hours = chineseNumberMap[chineseNum];
                    timeStr = chineseHourMatch2[0];
                }

                if (hours === undefined) {
                    console.log('未能识别到时间,返回null');
                    return null; // 没有识别到时间
                }

                console.log('识别到的小时数:', hours);
                console.log('识别到的分钟数:', minutes);
                console.log('timeStr:', timeStr);

                // 根据时间段调整小时数
                if (morningMatch) {
                    timeOfDay = 'morning';
                    // 早上/上午：如果是1-12点，保持不变；12点保持12点
                    if (hours === 12) {
                        hours = 12;
                    }
                } else if (afternoonMatch) {
                    timeOfDay = 'afternoon';
                    // 下午：如果是1-11点，加12小时变为13-23点；12点保持12点
                    if (hours !== 12) {
                        hours += 12;
                    }
                } else if (eveningMatch) {
                    timeOfDay = 'evening';
                    // 晚上：如果是1-11点，加12小时变为13-23点；12点保持12点
                    if (hours !== 12) {
                        hours += 12;
                    }
                } else if (nightMatch) {
                    timeOfDay = 'night';
                    // 深夜/凌晨：如果是1-5点，保持不变；6-12点加12小时
                    if (hours > 5 && hours <= 12) {
                        hours += 12;
                    }
                }

                // 计算提醒时间
                reminderTime = new Date(baseDate.getTime());
                reminderTime.setHours(hours, minutes, 0, 0);

                // 判断时间是否已过
                const timeHasPassed = reminderTime <= now;

                if (timeOfDay) {
                    // 如果有时间段标记（早上、晚上等）
                    if (timeHasPassed) {
                        // 如果指定的时间已经过去了，设置为明天
                        reminderTime.setDate(reminderTime.getDate() + 1);
                    }
                } else {
                    // 如果没有时间段标记
                    if (timeHasPassed) {
                        // 如果指定的时间已经过去了，设置为明天
                        reminderTime.setDate(reminderTime.getDate() + 1);
                    }
                    // 根据dayOffset添加对应的天数
                    reminderTime.setDate(reminderTime.getDate() + dayOffset);
                }
            }

            // 识别餐别
            let mealType = 'meal';

            if (isRelativeTime) {
                // 对于相对时间，先尝试提取时间前面的内容作为餐别
                // 支持阿拉伯数字和中文数字
                const timeMatch = timeStr.match(/[\d一二三四五六七八九十百]+\s*[分钟小时][之]?后/);
                if (timeMatch) {
                    const timeIndex = line.indexOf(timeMatch[0]);
                    if (timeIndex > 0) {
                        const beforeTime = line.substring(0, timeIndex).trim();
                        if (beforeTime) {
                            mealType = beforeTime; // 直接使用时间前面的内容作为餐别
                        }
                    }
                }

                // 如果时间前面没有内容，则查找"提醒我"关键词
                if (mealType === 'meal') {
                    // 支持阿拉伯数字和中文数字
                    const remindMatch = line.match(/提醒我\s*(.+?)(?:\s*[\d一二三四五六七八九十百]+\s*[分钟小时][之]?后|$)/);
                    if (remindMatch) {
                        mealType = remindMatch[1].trim();
                    }
                }

                // 如果还是没有找到，从整行中查找标准餐别关键词
                if (mealType === 'meal') {
                    for (const [type, keywords] of Object.entries(mealKeywords)) {
                        for (const keyword of keywords) {
                            if (line.includes(keyword)) {
                                mealType = type;
                                break;
                            }
                        }
                    }
                }
            } else {
                // 对于绝对时间，优先从"提醒我"后面提取内容作为餐别
                const remindMatch = line.match(/提醒我\s*(.+?)(?:\s*(\d{1,2})点|$)/);
                if (remindMatch) {
                    mealType = remindMatch[1].trim();
                }

                // 如果没有找到"提醒我"，则使用时间前面的内容作为餐别
                if (mealType === 'meal') {
                    const timeIndex = line.indexOf(timeStr);
                    if (timeIndex > 0) {
                        const beforeTime = line.substring(0, timeIndex).trim();
                        // 排除时间段关键词
                        const timeOfDayKeywords = ['早上', '早晨', '上午', '下午', '午后', '晚上', '夜间', '夜里', '深夜', '凌晨'];
                        if (beforeTime && !timeOfDayKeywords.some(kw => beforeTime.includes(kw))) {
                            mealType = beforeTime;
                        }
                    }
                }

                // 如果还是没有找到，在整行中查找标准餐别关键词
                if (mealType === 'meal') {
                    for (const [type, keywords] of Object.entries(mealKeywords)) {
                        for (const keyword of keywords) {
                            if (line.includes(keyword)) {
                                mealType = type;
                                break;
                            }
                        }
                    }
                }
            }

            // 如果是今天（dayOffset=0）且时间已过，不自动调整
            // 让用户自己决定是否要删除或编辑

            // 提取食物内容
            let content = '';

            if (isRelativeTime) {
                // 对于相对时间，提取时间前面的内容作为详细内容
                const timeMatch = timeStr.match(/[\d一二三四五六七八九十百]+\s*[分钟小时][之]?后/);
                if (timeMatch) {
                    const timeIndex = line.indexOf(timeMatch[0]);
                    if (timeIndex > 0) {
                        content = line.substring(0, timeIndex).trim();
                    }
                }

                // 如果时间前面没有内容，尝试提取"提醒我"后面的内容
                if (!content) {
                    const remindMatch = line.match(/提醒我\s*(.+?)(?:\s*[\d一二三四五六七八九十百]+\s*[分钟小时][之]?后|$)/);
                    if (remindMatch) {
                        content = remindMatch[1].trim();
                    }
                }

                // 移除标准餐别关键词
                for (const keywords of Object.values(mealKeywords)) {
                    for (const keyword of keywords) {
                        if (content.startsWith(keyword)) {
                            content = content.substring(keyword.length).trim();
                            break;
                        }
                    }
                }
            } else {
                // 对于绝对时间，优先从"提醒我"后面提取内容
                const remindMatch = line.match(/提醒我\s*(.+?)(?:\s*(\d{1,2})点|$)/);
                if (remindMatch) {
                    content = remindMatch[1].trim();
                }

                // 如果没有找到"提醒我"，则使用时间后面的内容
                if (!content) {
                    const timePos = line.indexOf(timeStr);
                    if (timePos >= 0) {
                        const afterTime = line.substring(timePos + timeStr.length).trim();
                        content = afterTime;
                    }
                }

                // 如果还是没有内容，则尝试提取整行内容并移除标准餐别关键词
                if (!content) {
                    content = line
                        .replace(/(\d{1,2}:\d{2})/, '')
                        .replace(/(\d{1,2})点/, '')
                        .replace(/(\d{1,2})时/, '')
                        .replace(/早上|早晨|上午|下午|午后|晚上|夜间|夜里|深夜|凌晨/g, '')
                        .replace(/早餐|早饭|晨|早|午餐|午饭|午|晚餐|晚饭|夜|晚|点心|零食|加餐|下午茶|夜宵/g, '')
                        .replace(/明天|后天|今天/g, '')
                        .replace(/\s+/g, ' ')
                        .trim();
                }
            }

            if (!content) {
                content = '记得用餐';
            }

            // 计算属于哪一天
            const reminderDayOffset = Math.floor((reminderTime.getTime() - baseDate.getTime()) / (1000 * 60 * 60 * 24));
            const dayIndex = reminderDayOffset + 1; // 转换为1-7

            // 当使用相对时间或自然语言绝对时间时，使用当前查看的天数（currentViewDay）
            // 当使用指定Day X格式时，使用dayOffset参数
            const hasDayPrefix = line.trim().match(/^Day\s*\d+/i);
            const finalDayIndex = (isRelativeTime || (!hasDayPrefix && timeOfDay)) ? currentViewDay : dayOffset;

            console.log('parseDietLine - dayIndex计算:', {
                line,
                isRelativeTime,
                dayOffset,
                reminderTime: reminderTime.toLocaleString('zh-CN'),
                baseDate: baseDate.toLocaleString('zh-CN'),
                reminderDayOffset,
                calculatedDayIndex: dayIndex,
                finalDayIndex,
                currentViewDay
            });

            return {
                id: Date.now() + Math.random(),
                mealType,
                content,
                reminderTime: reminderTime.getTime(),
                active: true,
                notified: false,
                dayIndex: finalDayIndex // 使用dayOffset
            };
        }

        // 渲染提醒列表（时钟样式）
        function renderReminders() {
            const container = document.getElementById('remindersContainer');

            if (reminders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <p>暂无饮食提醒，开始添加你的第一个计划吧！</p>
                    </div>
                `;
                return;
            }

            // 按天分组
            const groups = {};

            reminders.forEach(reminder => {
                const dayIndex = reminder.dayIndex !== undefined ? reminder.dayIndex : 1;

                if (!groups[dayIndex]) {
                    groups[dayIndex] = {
                        dateStr: getSpecificDate(dayIndex),
                        dayLabel: getDateLabel(dayIndex),
                        reminders: []
                    };
                }
                groups[dayIndex].reminders.push(reminder);
            });

            // 显示当前天
            const group = groups[currentViewDay];

            if (group && group.reminders.length > 0) {
                // 按状态和时间排序：未完成的在前，已完成的在后
                // 未完成的按时间升序排序，已完成的按时间降序排序
                const now = new Date();
                const sortedDayReminders = group.reminders.sort((a, b) => {
                    const aIsCompleted = a.notified && now >= a.reminderTime;
                    const bIsCompleted = b.notified && now >= b.reminderTime;

                    // 如果完成状态不同，未完成的在前
                    if (aIsCompleted !== bIsCompleted) {
                        return aIsCompleted ? 1 : -1;
                    }

                    // 如果都未完成，按时间升序排序
                    if (!aIsCompleted && !bIsCompleted) {
                        return a.reminderTime - b.reminderTime;
                    }

                    // 如果都已完成，按时间降序排序（最新的在前）
                    return b.reminderTime - a.reminderTime;
                });

                // 生成时钟和时间显示HTML
                let clockHtml = generateClockHtml(sortedDayReminders, group);

                // 生成详情列表HTML
                let detailsHtml = sortedDayReminders.map(reminder => {
                    const date = new Date(reminder.reminderTime);
                    const timeStr = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                    const displayMealType = formatMealType(reminder.mealType);
                    const hasContent = reminder.content && reminder.content.trim() !== '';

                    // 根据day0设置重新计算判断是否应该显示"已提醒"
                    const now = new Date();
                    const shouldShowNotified = reminder.notified && now >= reminder.reminderTime;

                    const mealClass = getMealClass(reminder.mealType);

                    return `
                        <div class="clock-detail-item ${mealClass} ${shouldShowNotified ? 'completed' : ''}">
                            ${shouldShowNotified ? '<div style="position:absolute;top:5px;right:5px;background:#667eea;color:white;padding:2px 8px;border-radius:10px;font-size:0.7em;">已完成</div>' : ''}
                            <div class="detail-time">${timeStr}</div>
                            <div class="detail-content">
                                <div class="meal-type">${displayMealType}</div>
                                ${hasContent ? `<div class="meal-content">${reminder.content}</div>` : ''}
                            </div>
                            <div class="detail-actions">
                                <button class="btn btn-secondary" onclick="openEditModal(${reminder.id})" style="padding:5px 10px;font-size:0.8em;">编辑</button>
                                <button class="btn btn-danger" onclick="deleteReminder(${reminder.id})" style="padding:5px 10px;font-size:0.8em;">删除</button>
                            </div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = `
                    <div class="day-view">
                        <div class="day-view-header">
                            ${group.dayLabel} - ${group.dateStr}
                        </div>
                        <div class="clock-container">
                            ${clockHtml}
                            <div class="clock-details">
                                ${detailsHtml}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="day-view">
                        <div class="day-view-header">
                            ${getDateLabel(currentViewDay)}
                        </div>
                        <div class="empty-state">
                            <p>这一天没有设置饮食计划</p>
                        </div>
                    </div>
                `;
            }
        }

        // 生成时钟HTML - 优化版（带指针，无秒针）
        function generateClockHtml(reminders, group) {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();

            // 计算指针角度（确保与刻度准确对应）
            // 24小时制：时针每小时15度（360/24），每分钟0.25度（15/60）
            // 分针：每分钟6度
            const hourAngle = (hours * 15) + (minutes * 0.25);
            const minuteAngle = minutes * 6;

            // 当前时间字符串（带秒数）
            const seconds = now.getSeconds();
            const currentTimeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            const currentDateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

            // 生成时钟刻度
            let marksHtml = '';
            for (let i = 0; i < 60; i++) {
                const angle = (i * 6 - 90) * (Math.PI / 180);
                const isMajor = i % 5 === 0;
                const radius = 190;
                const length = isMajor ? 20 : 10;
                const x1 = Math.cos(angle) * radius + 194;  // 往左移动6像素
                const y1 = Math.sin(angle) * radius + 195;  // 往上移动5像素
                const x2 = Math.cos(angle) * (radius - length) + 194;  // 往左移动6像素
                const y2 = Math.sin(angle) * (radius - length) + 195;  // 往上移动5像素

                marksHtml += `
                    <div class="clock-mark ${isMajor ? 'major' : 'minor'}"
                         style="left: ${x1}px; top: ${y1}px; transform: rotate(${i * 6}deg);"></div>
                `;
            }

            // 生成时钟数字（24小时制：0-23）
            let numbersHtml = '';
            for (let i = 0; i < 24; i++) {
                // 只显示偶数小时，避免数字过于密集
                if (i % 2 !== 0) continue;

                const angle = (i * 15 - 90) * (Math.PI / 180);
                const radius = 150;
                const x = Math.cos(angle) * radius + 194;  // 往左移动6像素
                const y = Math.sin(angle) * radius + 195;  // 往上移动5像素

                // 判断这个小时是否已经过去
                const isPast = (hours > i) || (hours === i && minutes > 0);
                const pastClass = isPast ? 'past' : '';

                numbersHtml += `<div class="clock-number ${pastClass}" style="left: ${x}px; top: ${y}px;">${i}</div>`;
            }

            // 生成饮食标记点
            let markersHtml = '';
            reminders.forEach(reminder => {
                const date = new Date(reminder.reminderTime);
                const reminderHours = date.getHours();
                const reminderMinutes = date.getMinutes();

                // 24小时制：直接使用小时值，无需转换
                const displayHour = reminderHours;

                // 计算角度（考虑分钟）- 24小时制每小时15度
                const angle = (displayHour * 15 + reminderMinutes * 0.25 - 90) * (Math.PI / 180);
                const radius = 175; // 标记点距离中心的半径（移到表盘边缘，接近刻度）

                const x = Math.cos(angle) * radius + 200;
                const y = Math.sin(angle) * radius + 200;

                const timeStr = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                const displayMealType = formatMealType(reminder.mealType);
                const hasContent = reminder.content && reminder.content.trim() !== '';
                const mealClass = getMealClass(reminder.mealType);
                const mealIcon = getMealIcon(reminder.mealType);

                // 计算提示框的位置（根据标记点的角度调整）- 24小时制角度计算
                let tooltipStyle = '';
                const angleDeg = displayHour * 15 + reminderMinutes * 0.25 - 90;

                if (angleDeg >= -45 && angleDeg <= 45) {
                    tooltipStyle = 'top: -50px;';
                } else if (angleDeg > 45 && angleDeg <= 135) {
                    tooltipStyle = 'right: -60px; top: 0;';
                } else if (angleDeg > 135 || angleDeg <= -135) {
                    tooltipStyle = 'bottom: -50px;';
                } else {
                    tooltipStyle = 'left: -60px; top: 0;';
                }

                markersHtml += `
                    <div class="meal-marker ${mealClass} ${reminder.notified && now >= reminder.reminderTime ? 'completed' : ''}" style="left: ${x}px; top: ${y}px;" onclick="openEditModal(${reminder.id})">
                        ${mealIcon}
                        <div class="meal-tooltip" style="${tooltipStyle}">
                            <div class="tooltip-time">${timeStr}</div>
                            <div class="tooltip-meal">${displayMealType}</div>
                            ${hasContent ? `<div class="tooltip-content">${reminder.content.substring(0, 15)}${reminder.content.length > 15 ? '...' : ''}</div>` : ''}
                        </div>
                    </div>
                `;
            });

            // 统计信息
            const totalReminders = reminders.length;
            const notifiedReminders = reminders.filter(r => {
                const now = new Date();
                return r.notified && now >= r.reminderTime;
            }).length;
            const pendingReminders = totalReminders - notifiedReminders;

            // 生成已过去的时间区域（用SVG扇形表示）
            // 24小时制：0点在顶部（12点方向），当前时针角度 = hours * 15 + minutes * 0.25
            // 0点 = 0度，6点 = 90度，12点 = 180度，18点 = 270度
            // 扩大SVG尺寸到412x412（400内容+6px边框×2），让扇形和表盘外边框对齐
            const pastTimeHtml = `
                <div class="clock-past-time">
                    <svg width="412" height="412" viewBox="-6 -6 424 424" class="clock-past-segment">
                        <path class="clock-past-sector" d="
                            M 200 200
                            L 200 -6
                            A 206 206 0 ${hourAngle > 180 ? 1 : 0} 1
                            ${200 + 206 * Math.cos((hourAngle - 90) * Math.PI / 180)}
                            ${200 + 206 * Math.sin((hourAngle - 90) * Math.PI / 180)}
                            Z
                        "/>
                    </svg>
                </div>
            `;

            return `
                <div class="clock-face-wrapper">
                    <div class="clock-face">
                        ${pastTimeHtml}
                        ${marksHtml}
                        ${numbersHtml}
                        ${markersHtml}

                    </div>
                    <div class="clock-time-display">
                        <div class="main-time">
                            <div class="time" id="clockDetailTime">${currentTimeStr}</div>
                            <div class="date" id="clockDetailDate">${currentDateStr}</div>
                        </div>
                        <div class="current-day-info">
                            <h4>${group.dayLabel} 统计</h4>
                            <div class="info-item">
                                <span class="info-label">总提醒数</span>
                                <span class="info-value">${totalReminders} 个</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">已完成</span>
                                <span class="info-value" style="color:#66BB6A;">${notifiedReminders} 个</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">待提醒</span>
                                <span class="info-value" style="color:#FF9800;">${pendingReminders} 个</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 获取餐别对应的CSS类
        function getMealClass(mealType) {
            if (mealType.includes('早餐') || mealType.includes('早') || mealType === 'breakfast') return 'breakfast';
            if (mealType.includes('午餐') || mealType.includes('午') || mealType === 'lunch') return 'lunch';
            if (mealType.includes('晚餐') || mealType.includes('晚') || mealType === 'dinner') return 'dinner';
            if (mealType.includes('点心') || mealType.includes('零食') || mealType === 'snack') return 'snack';
            if (mealType.includes('水')) return 'water';
            return 'custom';
        }

        // 切换整天的提醒
        function toggleDay(dayIndex) {
            reminders = reminders.map(r =>
                r.dayIndex === dayIndex ? { ...r, active: !r.active } : r
            );
            saveReminders();
            renderReminders();
        }

        // 删除整天的提醒
        function deleteDay(dayIndex) {
            reminders = reminders.filter(r => r.dayIndex !== dayIndex);
            saveReminders();
            renderReminders();
        }

        // 打开编辑弹窗
        function openEditModal(reminderId) {
            const reminder = reminders.find(r => r.id === reminderId);
            if (!reminder) return;

            editingReminderId = reminderId;

            const date = new Date(reminder.reminderTime);
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');

            document.getElementById('editMealType').value = reminder.mealType;
            document.getElementById('editTime').value = `${hours}:${minutes}`;
            document.getElementById('editContent').value = reminder.content;

            document.getElementById('editModal').classList.add('show');
        }

        // 获取餐别图标
        function getMealIcon(mealType) {
            if (mealType.includes('早餐') || mealType.includes('早')) return '🥚';
            if (mealType.includes('午餐') || mealType.includes('午')) return '🍚';
            if (mealType.includes('晚餐') || mealType.includes('晚')) return '🍲';
            if (mealType.includes('点') || mealType.includes('果')) return '🍎';
            if (mealType.includes('水')) return '💧';
            if (mealType.includes('运动') || mealType.includes('动')) return '🏃';
            if (mealType.includes('药')) return '💊';
            if (mealType.includes('零食')) return '🥤';
            return '🍽️';
        }

        // 转换餐别为中文显示
        function formatMealType(mealType) {
            if (mealType === 'breakfast') return '🥚 早餐';
            if (mealType === 'lunch') return '🍚 午餐';
            if (mealType === 'dinner') return '🍲 晚餐';
            if (mealType === 'snack') return '🍎 点心/果蔬汁';
            // 如果已经是中文，直接返回
            return mealType;
        }

        // 关闭编辑弹窗
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editingReminderId = null;
        }

        // 打开添加提醒弹窗
        function openAddReminderModal() {
            document.getElementById('addMealType').value = '';
            document.getElementById('addContent').value = '';

            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('addTime').value = `${hours}:${minutes}`;

            document.getElementById('addReminderModal').classList.add('show');
        }

        // 关闭添加提醒弹窗
        function closeAddReminderModal() {
            document.getElementById('addReminderModal').classList.remove('show');
        }

        // 保存新提醒
        function saveAddReminder() {
            const mealType = document.getElementById('addMealType').value.trim();
            const timeValue = document.getElementById('addTime').value;
            const content = document.getElementById('addContent').value.trim();

            if (!mealType) {
                showCustomModal('输入提示', '请输入餐别');
                return;
            }

            if (!timeValue) {
                showCustomModal('输入提示', '请选择时间');
                return;
            }

            const [hours, minutes] = timeValue.split(':').map(Number);

            // 使用day1基准日期来计算提醒时间
            const baseDate = new Date(day0Date);
            baseDate.setHours(0, 0, 0, 0);

            const reminderTime = new Date(baseDate.getTime());
            // 计算正确的天数偏移：Day1=0天，Day2=1天，Day3=2天
            reminderTime.setDate(reminderTime.getDate() + (currentViewDay - 1));
            reminderTime.setHours(hours, minutes, 0, 0);

            // 检查是否为过去的时间
            const now = Date.now();
            if (reminderTime.getTime() <= now) {
                const timeStr = reminderTime.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                const userChoice = confirm(
                    `警告：您设置的时间 ${timeStr} 已经过去！\n\n` +
                    `点击"确定"继续保存（此提醒不会发出通知）。\n` +
                    `点击"取消"重新选择时间。`
                );

                if (!userChoice) {
                    return; // 用户取消，不保存
                }
            }

            // 直接使用当前查看的天数（今天=day0，明天=day1）
            const dayIndex = currentViewDay;

            const newReminder = {
                id: Date.now() + Math.random(),
                mealType,
                content,
                reminderTime: reminderTime.getTime(),
                active: true,
                notified: reminderTime.getTime() <= now ? true : false, // 如果是过去的时间，标记为已通知
                dayIndex: dayIndex
            };

            reminders.push(newReminder);
            saveReminders();

            renderReminders();
            closeAddReminderModal();
        }

        // 保存编辑
        function saveEdit() {
            if (editingReminderId === null) return;

            const mealType = document.getElementById('editMealType').value.trim();
            const timeValue = document.getElementById('editTime').value;
            const content = document.getElementById('editContent').value.trim();

            if (!mealType) {
                showCustomModal('输入提示', '请输入餐别');
                return;
            }

            if (!timeValue) {
                showCustomModal('输入提示', '请选择时间');
                return;
            }

            const [hours, minutes] = timeValue.split(':').map(Number);

            // 计算新的提醒时间
            const baseDate = new Date(day0Date);
            baseDate.setHours(0, 0, 0, 0);

            const reminderTime = new Date(baseDate.getTime());
            reminderTime.setDate(reminderTime.getDate() + (currentViewDay - 1));
            reminderTime.setHours(hours, minutes, 0, 0);

            // 检查是否为过去的时间
            const now = Date.now();
            if (reminderTime.getTime() <= now) {
                const timeStr = reminderTime.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                const userChoice = confirm(
                    `警告：您设置的时间 ${timeStr} 已经过去！\n\n` +
                    `点击"确定"继续保存（此提醒不会发出通知）。\n` +
                    `点击"取消"重新选择时间。`
                );

                if (!userChoice) {
                    return; // 用户取消，不保存
                }
            }

            // 更新提醒
            reminders = reminders.map(r => {
                if (r.id === editingReminderId) {
                    return {
                        ...r,
                        mealType,
                        content,
                        reminderTime: reminderTime.getTime(),
                        dayIndex: currentViewDay,
                        notified: reminderTime.getTime() <= now ? true : r.notified // 如果是过去的时间，标记为已通知
                    };
                }
                return r;
            });

            saveReminders();
            renderReminders();
            closeEditModal();

            // 编辑后立即静默检查一次，标记已过期的提醒为已通知（不显示弹窗）
            checkReminders(true);
        }

        // 清除自定义音乐
        function clearCustomMusic() {
            if (confirm('确定要清除自定义音乐吗？此操作不可恢复！')) {
                customAudioBuffer = null;
                customAudioName = '';

                console.log('✓ 清除自定义音乐');

                localStorage.removeItem('customReminderSound');
                localStorage.removeItem('customReminderSoundName');

                // 如果当前使用的是自定义音乐，切换回默认
                if (currentSoundType === 'custom') {
                    currentSoundType = 'bell';
                    localStorage.setItem('reminderSoundType', 'bell');
                    document.getElementById('soundType').value = 'bell';
                }

                updateCustomMusicInfo();
                alert('自定义音乐已清除');
            }
        }

        // 清除所有提醒
        function clearAllReminders() {
            showCustomModal('确认清除', '确定要清除所有饮食提醒吗？此操作不可恢复！', true);
        }

        // 确认清除所有提醒
        function confirmClearAllReminders() {
            reminders = [];
            currentViewDay = 1;
            localStorage.removeItem('dietReminders');
            // 同时清除其他保存的设置
            localStorage.removeItem('reminderSoundType');
            localStorage.removeItem('reminderVolume');
            renderReminders();
            closeCustomModal();
            showCustomModal('操作完成', '所有提醒已清除');
        }

        // 重置所有已通知状态（用于测试）
        function resetNotifications() {
            reminders = reminders.map(r => ({ ...r, notified: false }));
            saveReminders();
            renderReminders();
            alert('已重置所有提醒状态，准备重新触发提醒');
        }

        // 查看提醒详情
        function showRemindersInfo() {
            if (reminders.length === 0) {
                alert('暂无提醒');
                return;
            }

            const now = new Date();
            const mealTypeNames = {
                breakfast: '早餐',
                lunch: '午餐',
                dinner: '晚餐',
                snack: '点心'
            };

            let info = '=== 饮食提醒详情 ===\n\n';

            const sortedReminders = [...reminders].sort((a, b) => a.reminderTime - b.reminderTime);
            const groups = {};

            sortedReminders.forEach(reminder => {
                const dayIndex = reminder.dayIndex !== undefined ? reminder.dayIndex : 0;
                if (!groups[dayIndex]) {
                    groups[dayIndex] = [];
                }
                groups[dayIndex].push(reminder);
            });

            for (let i = 0; i < 7; i++) {
                if (groups[i] && i > 0) { // 跳过Day0，从Day1开始显示
                    info += `${i === 1 ? '今天' : 'Day ' + i}:\n`;
                    groups[i].forEach(r => {
                        const date = new Date(r.reminderTime);
                        const timeStr = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                        const dateStr = date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
                        const diff = Math.round((r.reminderTime - now.getTime()) / 1000 / 60); // 分钟差

                        info += `  ${timeStr} (${dateStr}) - ${mealTypeNames[r.mealType] || '用餐'}: ${r.content}\n`;
                        info += `  状态: ${r.active ? '已启用' : '已禁用'}, 距离提醒: ${diff > 0 ? diff + '分钟后' : '已过期'}\n\n`;
                    });
                }
            }

            alert(info);
        }

        // 切换提醒状态
        function toggleReminder(id) {
            reminders = reminders.map(r =>
                r.id === id ? { ...r, active: !r.active } : r
            );
            saveReminders();
            renderReminders();
        }

        // 删除提醒
        function deleteReminder(id) {
            reminders = reminders.filter(r => r.id !== id);
            saveReminders();
            renderReminders();
        }

        // 保存提醒到本地存储
        function saveReminders() {
            localStorage.setItem('dietReminders', JSON.stringify(reminders));
        }

        // 检查提醒
        function checkReminders(silent = false) {
            const now = Date.now();
            let hasNewNotification = false;
            let notificationReminders = [];
            
            reminders.forEach(reminder => {
                if (reminder.active) {
                    // 检查是否已经过期（当前时间 >= 提醒时间）
                    if (now >= reminder.reminderTime) {
                        // 如果还没有被标记为已通知，标记它
                        if (!reminder.notified) {
                            reminder.notified = true;
                            hasNewNotification = true;
                            notificationReminders.push(reminder);
                        }
                    }
                }
            });
            
            // 如果有新的提醒被标记，保存到本地存储
            if (hasNewNotification) {
                saveReminders();
                // 立即更新UI显示"已提醒"标识
                renderReminders();
                
                // 如果不是静默模式，显示通知弹窗（只显示第一个到期的提醒）
                if (!silent && notificationReminders.length > 0) {
                    const banner = document.getElementById('notificationBanner');
                    if (!banner.classList.contains('show')) {
                        showNotification(notificationReminders[0]);
                    }
                }
            }
        }

        // 显示通知
        function showNotification(reminder) {
            const displayMealType = formatMealType(reminder.mealType);

            // 播放提醒声音
            playReminderSound();

            // 页面内通知弹窗
            document.getElementById('notificationText').innerHTML = `<strong>${displayMealType}</strong><br>${reminder.content}`;
            document.getElementById('notificationBanner').classList.add('show');
        }

        // 关闭通知
        function closeNotification() {
            document.getElementById('notificationBanner').classList.remove('show');
            
            // 停止提醒声音循环播放
            stopReminderLoop();
            
            // 停止所有正在播放的音频
            stopAllAudio();
        }

        // 显示自定义弹窗
        function showCustomModal(title, message, showConfirm = false) {
            document.getElementById('customModalTitle').textContent = title;
            document.getElementById('customModalText').textContent = message;
            
            const modalActions = document.querySelector('.custom-modal-actions');
            if (showConfirm) {
                modalActions.innerHTML = `
                    <button class="btn btn-secondary" onclick="closeCustomModal()">取消</button>
                    <button class="btn btn-danger" onclick="confirmClearAllReminders()">确定清除</button>
                `;
            } else {
                modalActions.innerHTML = '<button class="btn" onclick="closeCustomModal()">确定</button>';
            }
            
            document.getElementById('customModal').classList.add('show');
        }

        // 关闭自定义弹窗
        function closeCustomModal() {
            document.getElementById('customModal').classList.remove('show');
        }
        
        // 强制停止所有音频（不依赖播放状态）
        function forceStopAllAudio() {
            try {
                // 停止Web Audio API生成的振荡器音频
                if (window.audioOscillators) {
                    window.audioOscillators.forEach(oscillator => {
                        if (oscillator) {
                            try {
                                oscillator.stop();
                                oscillator.disconnect();
                            } catch (e) {
                                console.log('停止振荡器时出错:', e);
                            }
                        }
                    });
                    window.audioOscillators = [];
                }
                
                // 先停止当前正在播放的测试音频源
                if (currentTestAudioSource) {
                    try {
                        currentTestAudioSource.stop();
                        currentTestAudioSource.disconnect();
                    } catch (e) {
                        console.log('停止当前测试音频源时出错:', e);
                    }
                }
                
                // 断开增益节点连接
                if (currentGainNode) {
                    try {
                        currentGainNode.disconnect();
                    } catch (e) {
                        console.log('断开增益节点时出错:', e);
                    }
                }
                
                // 停止通过AudioContext播放的自定义音乐（测试音频）
                if (window.customAudioSources) {
                    window.customAudioSources.forEach(source => {
                        if (source) {
                            try {
                                source.stop();
                                source.disconnect();
                            } catch (e) {
                                console.log('停止测试音频源时出错:', e);
                            }
                        }
                    });
                    window.customAudioSources = [];
                }
                
                // 停止通过AudioContext播放的提醒音频
                if (window.reminderAudioSources) {
                    window.reminderAudioSources.forEach(source => {
                        if (source) {
                            try {
                                source.stop();
                                source.disconnect();
                            } catch (e) {
                                console.log('停止提醒音频源时出错:', e);
                            }
                        }
                    });
                    window.reminderAudioSources = [];
                }
                
                // 重置当前测试音频源和增益节点
                currentTestAudioSource = null;
                currentGainNode = null;
                
                // 停止Web Audio API生成的音频上下文
                if (audioContext) {
                    try {
                        audioContext.close();
                        audioContext = null;
                    } catch (e) {
                        console.log('关闭音频上下文时出错:', e);
                    }
                }
                
                // 停止通过Audio元素播放的自定义音乐
                const audioElements = document.querySelectorAll('audio');
                audioElements.forEach(audio => {
                    try {
                        audio.pause();
                        audio.currentTime = 0;
                    } catch (e) {
                        console.log('停止Audio元素时出错:', e);
                    }
                });
            } catch (error) {
                console.error('强制停止音频时出错:', error);
            }
        }
        
        // 停止所有音频播放
        function stopAllAudio() {
            try {
                // 更新测试音频播放状态
                if (isAudioPlaying) {
                    isAudioPlaying = false;
                    
                    // 更新测试按钮文本
                    const testButton = document.querySelector('button[onclick="testSound()"]');
                    if (testButton) {
                        testButton.innerHTML = '🔊 测试声音';
                    }
                    
                    // 记录暂停时间（如果是自定义音乐）
                    if (currentSoundType === 'custom' && audioContext && currentTestAudioSource) {
                        try {
                            audioPausedTime = audioContext.currentTime - audioStartTime;
                        } catch (e) {
                            console.log('计算暂停时间时出错:', e);
                            audioPausedTime = 0;
                        }
                    }
                }
                
                // 停止Web Audio API生成的振荡器音频
                if (window.audioOscillators) {
                    window.audioOscillators.forEach(oscillator => {
                        if (oscillator) {
                            try {
                                oscillator.stop();
                                oscillator.disconnect();
                            } catch (e) {
                                console.log('停止振荡器时出错:', e);
                            }
                        }
                    });
                    window.audioOscillators = [];
                }
                
                // 先停止当前正在播放的测试音频源
                if (currentTestAudioSource) {
                    try {
                        currentTestAudioSource.stop();
                        currentTestAudioSource.disconnect();
                    } catch (e) {
                        console.log('停止当前测试音频源时出错:', e);
                    }
                }
                
                // 断开增益节点连接
                if (currentGainNode) {
                    try {
                        currentGainNode.disconnect();
                    } catch (e) {
                        console.log('断开增益节点时出错:', e);
                    }
                }
                
                // 停止通过AudioContext播放的自定义音乐（测试音频）
                if (window.customAudioSources) {
                    window.customAudioSources.forEach(source => {
                        if (source) {
                            try {
                                source.stop();
                                source.disconnect();
                            } catch (e) {
                                console.log('停止测试音频源时出错:', e);
                            }
                        }
                    });
                    window.customAudioSources = [];
                }
                
                // 停止通过AudioContext播放的提醒音频
                if (window.reminderAudioSources) {
                    window.reminderAudioSources.forEach(source => {
                        if (source) {
                            try {
                                source.stop();
                                source.disconnect();
                            } catch (e) {
                                console.log('停止提醒音频源时出错:', e);
                            }
                        }
                    });
                    window.reminderAudioSources = [];
                }
                
                // 重置当前测试音频源和增益节点
                currentTestAudioSource = null;
                currentGainNode = null;
                
                // 停止Web Audio API生成的音频上下文
                if (audioContext) {
                    try {
                        audioContext.close();
                        audioContext = null;
                    } catch (e) {
                        console.log('关闭音频上下文时出错:', e);
                    }
                }
                
                // 停止通过Audio元素播放的自定义音乐
                const audioElements = document.querySelectorAll('audio');
                audioElements.forEach(audio => {
                    try {
                        audio.pause();
                        audio.currentTime = 0;
                    } catch (e) {
                        console.log('停止Audio元素时出错:', e);
                    }
                });

                // 停止正在试听的铃声
                if (window.ringtoneSource) {
                    try {
                        window.ringtoneSource.stop();
                        window.ringtoneSource.disconnect();
                        window.ringtoneSource = null;
                    } catch (e) {
                        console.log('停止铃声时出错:', e);
                    }
                }
                isRingtonePlaying = false;

                // 移除播放状态样式
                const infoSpan = document.getElementById('customMusicInfo');
                if (infoSpan) {
                    infoSpan.classList.remove('playing');
                }

            } catch (error) {
                console.error('停止音频时出错:', error);
            }
        }

        // 清空输入
        function clearInput() {
            document.getElementById('dietInput').value = '';
        }
        
        // 测试停止音频功能
        function testStopAudio() {
            // 先播放一个测试声音
            testSound();
            // 等待500毫秒后停止
            setTimeout(() => {
                stopAllAudio();
                alert('音频已停止！');
            }, 500);
        }

        // 日期设置相关函数
        
        // 打开日期设置弹窗
        function openDateSettings() {
            // 设置day0日期输入框的默认值
            document.getElementById('day0DateInput').valueAsDate = day0Date;
            
            // 设置显示模式
            const savedMode = localStorage.getItem('dateDisplayMode') || 'day';
            document.getElementById('dateDisplayMode').value = savedMode;
            
            document.getElementById('dateSettingsModal').classList.add('show');
        }
        
        // 关闭日期设置弹窗
        function closeDateSettings() {
            document.getElementById('dateSettingsModal').classList.remove('show');
        }
        
        // 保存日期设置
        function saveDateSettings() {
            const dateInput = document.getElementById('day0DateInput').valueAsDate;
            const displayMode = document.getElementById('dateDisplayMode').value;
            
            // 保存旧的day0日期用于重新计算
            const oldDay0Date = new Date(day0Date);
            
            if (dateInput) {
                day0Date = dateInput;
                localStorage.setItem('day0Date', day0Date.getTime().toString());
            }
            
            localStorage.setItem('dateDisplayMode', displayMode);
            
            closeDateSettings();
            
            // 重新计算所有提醒的绝对时间（因为day0日期变化了）
            recalculateReminderTimes(oldDay0Date);
            
            // 重新检查提醒状态
            checkReminders(true); // 静默模式，不显示通知
            renderReminders(); // 重新渲染以更新日期显示
            
            showCustomModal('设置成功', '日期设置已保存！');
        }
        
        // 获取具体日期字符串（根据day0日期和dayIndex计算）
        function getSpecificDate(dayIndex) {
            const specificDate = new Date(day0Date);
            
            // dayIndex就是天数偏移量（day1=今天，day2=明天，day3=后天）
            // 因为dayIndex从1开始，需要减1：day1=今天+0，day2=今天+1，day3=今天+2
            specificDate.setDate(specificDate.getDate() + (dayIndex - 1));
            
            return specificDate.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                weekday: 'long' 
            });
        }
        
        // 重新计算所有提醒的绝对时间（当day0日期变化时调用）
        function recalculateReminderTimes(oldDay0Date) {
            // 计算新旧day0日期的天数差
            const oldBaseDate = new Date(oldDay0Date);
            oldBaseDate.setHours(0, 0, 0, 0);
            
            const newBaseDate = new Date(day0Date);
            newBaseDate.setHours(0, 0, 0, 0);
            
            const dayDiff = Math.round((newBaseDate.getTime() - oldBaseDate.getTime()) / (1000 * 60 * 60 * 24));
            
            reminders.forEach(reminder => {
                // 基于新的day0日期重新计算dayIndex
                // 保持原来的dayIndex相对位置，但根据新旧day0的日期差进行调整
                let newDayIndex = reminder.dayIndex - dayDiff;
                
                // 确保dayIndex在1-7范围内
                if (newDayIndex < 1) newDayIndex = 1;
                if (newDayIndex > 7) newDayIndex = 7;
                
                // 重新计算提醒时间，确保与新的dayIndex对应
                const newReminderTime = new Date(newBaseDate.getTime());
                newReminderTime.setDate(newReminderTime.getDate() + (newDayIndex - 1));
                
                // 获取原来的时间部分（小时和分钟）
                const oldTime = new Date(reminder.reminderTime);
                const hours = oldTime.getHours();
                const minutes = oldTime.getMinutes();
                
                newReminderTime.setHours(hours, minutes, 0, 0);
                
                // 更新提醒的dayIndex和绝对时间
                reminder.dayIndex = newDayIndex;
                reminder.reminderTime = newReminderTime.getTime();
            });
            
            saveReminders(); // 保存更新后的提醒
        }
        
        // 获取日期标签（根据显示模式）
        function getDateLabel(dayIndex) {
            const displayMode = localStorage.getItem('dateDisplayMode') || 'day';
            
            if (displayMode === 'date') {
                return getSpecificDate(dayIndex);
            } else {
                // 默认模式：Day X（Day1=Day1，Day2=Day2，一直到Day7）
                return `Day ${dayIndex}`;
            }
        }
        
        // 页面加载完成后初始化
        window.onload = init;
    </script>
